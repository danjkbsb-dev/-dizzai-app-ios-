name: Build and Release

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0-<LaTex>${{ github.run_number }}
          name: DizzAí iOS v1.0.0 Build $</LaTex>{{ github.run_number }}
          body: |
            🚀 DizzAí iOS - Build <LaTex>${{ github.run_number }}
            
            App pronto para publicar na App Store!
            
            Build Number: $</LaTex>{{ github.run_number }}
            Commit: ${{ github.sha }}
          draft: false
          prerelease: false
